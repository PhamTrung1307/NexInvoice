name: nexinvoice

services:
  api:
    build:
      context: .
      dockerfile: src/NexInvoice.API/Dockerfile
    container_name: nexinvoice-api
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=NexInvoiceDb;User Id=sa;Password=${SA_PASSWORD:-Your_strong_password123!};TrustServerCertificate=True;Encrypt=False;"
      ConnectionStrings__Redis: "redis:6379"
      Redis__InstanceName: "NexInvoice:"
      Cors__AllowedOrigins__0: "http://localhost:3000"
      Cors__AllowedOrigins__1: "http://localhost:5173"
      Cors__AllowedOrigins__2: "http://127.0.0.1:5173"
    ports:
      - "8080:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_started

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: nexinvoice-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD:-Your_strong_password123!}"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: nexinvoice-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  sqlserver-data:
  redis-data:
